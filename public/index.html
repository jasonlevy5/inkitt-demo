<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Millennium Wolves</title>
<style>
/* ───────────────────────── VARIABLES ───────────────────────── */
:root {
  --bg-dark: #0a0a0f;
  --bg-card: #13131a;
  --bg-input: #1a1a24;
  --text-primary: #e8e0d4;
  --text-secondary: #9a8e80;
  --accent: #8b2f3f;
  --accent-hover: #a83a4e;
  --accent-glow: rgba(139, 47, 63, 0.4);
  --gold: #c4a265;
  --gold-dim: rgba(196, 162, 101, 0.15);
  --border: #2a2a35;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-ui: 'Segoe UI', system-ui, sans-serif;
}

/* ───────────────────────── RESET & BASE ───────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: var(--font-body);
  overflow: hidden;
}

/* ───────────────────────── SCREENS ───────────────────────── */
.screen {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
}
.screen.active { display: flex; }

/* ───────────────────────── SPLASH ───────────────────────── */
#splash {
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 4vh;
  background: var(--splash-bg);
  background-size: cover;
  background-position: center;
}

#splash::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 30%,
    rgba(10,10,15,0.6) 60%,
    rgba(10,10,15,0.95) 100%
  );
}

#splash .title-block {
  position: absolute;
  top: 6vh;
  z-index: 1;
  text-align: center;
}

#splash .title-block h1 {
  font-size: clamp(2.2rem, 6vw, 4.5rem);
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(196,162,101,0.3);
}

#splash .title-block p {
  font-size: 2rem;
  color: var(--text-secondary);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-top: 0.75rem;
}

.mode-select {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  width: 90%;
  max-width: 960px;
}

.btn-mode {
  background: rgba(10, 10, 15, 0.75);
  border: 1px solid rgba(196, 162, 101, 0.2);
  color: var(--text-primary);
  padding: 2.5rem 2rem;
  flex: 1;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
  backdrop-filter: blur(12px);
}
.btn-mode:hover {
  border-color: var(--gold);
  background: rgba(196, 162, 101, 0.08);
  box-shadow: 0 0 40px rgba(196, 162, 101, 0.12);
  transform: translateY(-4px);
}
.btn-mode .mode-label {
  font-family: var(--font-ui);
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  margin-bottom: 0.7rem;
  opacity: 0.8;
}
.btn-mode .mode-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.6rem;
  color: var(--text-secondary);
}
.btn-mode .mode-desc {
  font-family: var(--font-body);
  font-size: 1.4rem;
  color: var(--text-primary);
  display: block;
  letter-spacing: 0.06em;
}

/* ───────────────────────── SETTINGS LINK ───────────────────────── */
.settings-link {
  position: relative;
  z-index: 1;
  font-family: var(--font-ui);
  font-size: 1rem;
  color: var(--text-secondary);
  text-decoration: none;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
  margin-top: 1.5rem;
}
.settings-link:hover { color: var(--text-primary); }

/* ───────────────────────── ADMIN PANEL ───────────────────────── */
#admin {
  flex-direction: column;
  padding: 2.5rem 1.5rem;
  gap: 1.5rem;
  background: var(--bg-dark);
  max-width: 800px;
  margin: 0 auto;
  overflow-y: auto;
  width: 100%;
}

#admin h2 {
  font-family: var(--font-ui);
  font-size: 1.3rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  font-weight: 400;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.admin-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
}

#admin label {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.35rem;
  display: block;
}

#admin textarea {
  width: 100%;
  height: 50vh;
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem;
  font-family: var(--font-ui);
  font-size: 0.88rem;
  line-height: 1.65;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
#admin textarea:focus {
  border-color: var(--accent);
}

.admin-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem;
}
.admin-tab {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.7rem 1.4rem;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 4px 4px 0 0;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.admin-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
.admin-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.admin-actions {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}

.btn-save, .btn-back {
  font-family: var(--font-ui);
  font-size: 0.82rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.75rem 2.2rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-save {
  background: var(--accent);
  color: var(--text-primary);
  border-color: var(--accent);
}
.btn-save:hover { background: var(--accent-hover); }
.btn-back {
  background: transparent;
  color: var(--text-secondary);
}
.btn-back:hover { color: var(--text-primary); border-color: var(--text-secondary); }

.save-toast {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.save-toast.show { opacity: 1; }

/* ───────────────────────── SHARED GAME HEADER ───────────────────────── */
.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.game-header h3 {
  font-size: 0.85rem;
  color: var(--gold);
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.btn-restart {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 0.7rem;
  padding: 0.35rem 0.9rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-restart:hover { border-color: var(--text-secondary); color: var(--text-primary); }

/* ───────────────────────── TEXT NARRATIVE (existing) ───────────────────────── */
#gameText {
  flex-direction: column;
  background: var(--bg-dark);
}

.story-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 2rem 1.5rem;
  scroll-behavior: smooth;
}

.story-scroll::-webkit-scrollbar { width: 5px; }
.story-scroll::-webkit-scrollbar-track { background: transparent; }
.story-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.story-block {
  max-width: 700px;
  margin: 0 auto 2rem;
  animation: fadeIn 0.6s ease;
}

.story-text {
  font-size: 1.05rem;
  line-height: 1.85;
  color: var(--text-primary);
  white-space: pre-wrap;
}

.story-text p { margin-bottom: 1em; }

.choices {
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  animation: fadeIn 0.5s ease 0.2s both;
}

.btn-choice {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 1rem 1.3rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s ease;
  line-height: 1.5;
}
.btn-choice:hover {
  border-color: var(--accent);
  background: rgba(139,47,63,0.1);
  box-shadow: 0 0 20px rgba(139,47,63,0.15);
  transform: translateX(4px);
}
.btn-choice:disabled {
  opacity: 0.4;
  cursor: default;
  transform: none;
  box-shadow: none;
}

/* ───────────────────────── STORY INTRO CARD ───────────────────────── */
.story-intro {
  max-width: 700px;
  margin: 0 auto 2.5rem;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

.story-intro-img {
  width: 300px;
  height: 300px;
  object-fit: cover;
  border: 1px solid var(--border);
  margin-bottom: 1.2rem;
}

.story-intro-title {
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 0.6rem;
}

.story-intro-desc {
  font-family: var(--font-ui);
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 1rem;
  padding: 0 1rem;
}

.story-intro-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
  margin-bottom: 1.2rem;
}

.story-intro-tag {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  padding: 0.3rem 0.7rem;
  border-radius: 2px;
}

.story-intro-divider {
  width: 60px;
  height: 1px;
  background: var(--border);
  margin: 0 auto;
}

.custom-choice-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 1rem 1.3rem;
  width: 100%;
  outline: none;
  transition: all 0.25s ease;
  line-height: 1.5;
}
.custom-choice-input::placeholder { color: #555; font-style: italic; }
.custom-choice-input:focus {
  border-color: var(--accent);
  background: rgba(139,47,63,0.1);
  box-shadow: 0 0 20px rgba(139,47,63,0.15);
}

.player-choice {
  max-width: 700px;
  margin: 0 auto 2rem;
  padding: 0.6rem 1rem;
  border-left: 2px solid var(--gold);
  color: var(--gold);
  font-style: italic;
  font-size: 0.92rem;
  animation: fadeIn 0.3s ease;
}

.loading-indicator {
  max-width: 700px;
  margin: 0 auto 2rem;
  display: flex;
  gap: 0.4rem;
  padding: 1rem 0;
}
.loading-indicator span {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.2s ease infinite;
}
.loading-indicator span:nth-child(2) { animation-delay: 0.2s; }
.loading-indicator span:nth-child(3) { animation-delay: 0.4s; }

/* ───────────────────────── VISUAL NARRATIVE ───────────────────────── */
#gameVisual {
  flex-direction: column;
  background: #000;
}

#gameVisual .game-header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  background: transparent;
  border-bottom: none;
}
#gameVisual .game-header h3 {
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}
#gameVisual .btn-restart {
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  border-color: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
}

.visual-scene {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.visual-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: background-image 0.8s ease;
}

.visual-bg-fallback {
  position: absolute;
  inset: 0;
  transition: background 0.8s ease;
}

/* ── Speaker unit (portrait + name + dialogue card together) ── */
.visual-speaker {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 50%;
  animation: fadeInOnly 0.3s ease;
}
.visual-speaker.pos-left {
  left: 4%;
  align-items: flex-start;
}
.visual-speaker.pos-right {
  right: 4%;
  align-items: flex-end;
}

.visual-character-frame {
  width: 170px;
  height: 190px;
  clip-path: polygon(50% 0%, 96% 12%, 100% 55%, 82% 96%, 50% 100%, 18% 96%, 0% 55%, 4% 12%);
  background: linear-gradient(160deg, #a8d0e6, #7bb5d0, #5a9ab5, #7bb5d0);
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5));
}

.visual-character {
  width: 160px;
  height: 180px;
  object-fit: cover;
  clip-path: polygon(50% 0%, 96% 12%, 100% 55%, 82% 96%, 50% 100%, 18% 96%, 0% 55%, 4% 12%);
}

.visual-character-name {
  background: rgba(25, 30, 50, 0.95);
  color: #fff;
  font-family: var(--font-ui);
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  padding: 0.45rem 2.5rem;
  text-align: center;
  border-radius: 8px 8px 0 0;
  min-width: 130px;
}
.visual-character-name:empty { display: none; }

.visual-dialogue-card {
  background: rgba(255, 252, 245, 0.96);
  border-radius: 16px;
  padding: 1.4rem 1.5rem;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
}

.visual-text {
  font-family: var(--font-body);
  font-size: 1.05rem;
  line-height: 1.7;
  color: #2a2a3a;
  max-height: 28vh;
  overflow-y: auto;
}
.visual-text p {
  margin-bottom: 0.6em;
  color: #2a2a3a;
}

/* ── Narrator mode (no character) ── */
.visual-narrator-text {
  position: absolute;
  bottom: 35%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  background: rgba(255, 252, 245, 0.96);
  border-radius: 16px;
  padding: 1.2rem 2rem;
  max-width: 420px;
  width: 85%;
  text-align: center;
  font-size: 1.05rem;
  line-height: 1.6;
  color: #2a2a3a;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  animation: fadeInOnly 0.3s ease;
}

/* ── Tap zone (tap anywhere to advance) ── */
.visual-tap-zone {
  position: absolute;
  inset: 0;
  z-index: 4;
  cursor: pointer;
}
.visual-tap-zone.disabled {
  pointer-events: none;
}

/* ── Choices (Choices-style buttons) ── */
.visual-choices {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  width: 90%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.visual-choices .btn-choice {
  background: rgba(25, 30, 50, 0.92);
  border: 1px solid rgba(160, 200, 230, 0.25);
  color: #fff;
  border-radius: 10px;
  padding: 0.8rem 1.2rem;
  font-size: 0.9rem;
  text-align: center;
  backdrop-filter: blur(8px);
  font-family: var(--font-ui);
  letter-spacing: 0.02em;
}
.visual-choices .btn-choice:hover {
  background: rgba(40, 50, 80, 0.95);
  border-color: rgba(160, 200, 230, 0.5);
  transform: none;
  box-shadow: 0 0 15px rgba(160, 200, 230, 0.15);
}

.visual-choices .custom-choice-input {
  background: rgba(25, 30, 50, 0.92);
  border: 1px solid rgba(160, 200, 230, 0.25);
  color: #fff;
  border-radius: 10px;
  padding: 0.8rem 1.2rem;
  font-size: 0.9rem;
  text-align: center;
  backdrop-filter: blur(8px);
  font-family: var(--font-ui);
}
.visual-choices .custom-choice-input::placeholder { color: rgba(255,255,255,0.35); font-style: italic; }
.visual-choices .custom-choice-input:focus {
  border-color: rgba(160, 200, 230, 0.5);
  background: rgba(40, 50, 80, 0.95);
  box-shadow: 0 0 15px rgba(160, 200, 230, 0.15);
}

/* ── Floating loading dots overlay (no card) ── */
.visual-loading-overlay {
  position: absolute;
  bottom: 35%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 0.5rem;
}
.visual-loading-overlay span {
  width: 8px; height: 8px;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 50%;
  animation: pulse 1.2s ease infinite;
}
.visual-loading-overlay span:nth-child(2) { animation-delay: 0.2s; }
.visual-loading-overlay span:nth-child(3) { animation-delay: 0.4s; }

/* ───────────────────────── CHAT MODE ───────────────────────── */
#gameChat {
  flex-direction: column;
  background: var(--bg-dark);
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.8rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-size: 0.85rem;
  color: var(--text-primary);
  font-weight: 600;
  overflow: hidden;
}
.chat-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.chat-header-info {
  flex: 1;
}
.chat-header-name {
  font-family: var(--font-ui);
  font-size: 0.9rem;
  color: var(--text-primary);
  letter-spacing: 0.05em;
}
.chat-header-status {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  color: var(--text-secondary);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.chat-row {
  display: flex;
  gap: 0.6rem;
  align-items: flex-start;
  animation: fadeIn 0.3s ease;
}
.chat-row.them { align-self: flex-start; }
.chat-row.me { align-self: flex-end; flex-direction: row-reverse; }

.chat-msg-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ui);
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-weight: 600;
}
.chat-msg-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.chat-row.me .chat-msg-avatar {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--text-primary);
}

.chat-bubble {
  max-width: 70%;
  padding: 0.75rem 1rem;
  font-size: 0.92rem;
  line-height: 1.55;
  white-space: pre-wrap;
}
.chat-row.them .chat-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
  color: var(--text-primary);
}
.chat-row.me .chat-bubble {
  background: var(--accent);
  border-radius: 12px 2px 12px 12px;
  color: var(--text-primary);
}
.chat-bubble .bubble-name {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.3rem;
  display: block;
}

.chat-typing {
  align-self: flex-start;
  display: flex;
  gap: 0.3rem;
  padding: 0.75rem 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 2px 12px 12px 12px;
}
.chat-typing span {
  width: 6px; height: 6px;
  background: var(--text-secondary);

.chat-typing span:nth-child(2) { animation-delay: 0.2s; }

.chat-input-bar {

/* ───────────────────────── ANIMATIONS ───────────────────────── */

/* ── Story Bible (shared) ── */
const DEFAULT_STORY_BIBLE = `# The Millennium Wolves — Story Bible

## Setting
The story takes place in a modern world where werewolf packs live hidden among humans. Every thousand years, the Mating Season — known as "The Millennium" — arrives. During this time, primal instincts overwhelm all wolves, driving them toward their destined mates with an irresistible pull.

## Main Character (The Player)
Sienna is a 19-year-old she-wolf experiencing her first Millennium. She is strong-willed, independent, and determined not to lose herself to the Season's heat. She lives on the outskirts of the East Pack territory with her best friend and packmate. She has a complicated family history — her parents disappeared years ago under mysterious circumstances.

## The Alpha — Aiden Norwood
Aiden is the young, powerful Alpha of the East Pack. He is 25, brooding, intense, and dangerously magnetic. He has a reputation for being cold and unyielding, but there are rumors of a buried gentleness. He has never taken a mate despite immense pressure from the Pack Elders. When he catches Sienna's scent, something ancient awakens in him.

## The Pack
- **East Pack**: One of four great packs. Wealthy, disciplined, militaristic. Headquartered in a sprawling estate deep in a pine forest.
- **Pack Elders**: Conservative council that advises (and pressures) the Alpha. They want Aiden mated to a high-ranking she-wolf, not an outsider like Sienna.
- **Beta — Josh**: Aiden's second-in-command and childhood friend. Loyal but harboring his own secrets.
- **Sienna's Best Friend — Michelle**: Bubbly, fearless, already embracing the Season. Provides comic relief and emotional support.

## The Millennium (Mating Season)
- Happens every 1,000 years, lasts one full lunar cycle (28 days).
- Wolves feel an overwhelming pull toward their destined mate.
- Resisting the pull causes physical pain, fever, and vivid dreams.
- The bond, once completed, is permanent and unbreakable.
- Not all wolves find their mate — some go mad from the unfulfilled pull.

## Tone & Atmosphere
Dark romance, tension-filled. The world feels both modern and ancient. Candlelit pack ceremonies contrast with sleek modern interiors. The forest is ever-present — mysterious, alive, watching. Sensuality is woven into the atmosphere but remains tasteful and suggestive rather than explicit. Danger lurks beneath the surface: rival packs, political schemes, and a secret about Sienna's bloodline that could change everything.

## Key Conflicts
1. Sienna's resistance to the mating pull vs. the undeniable connection with Aiden
2. The Pack Elders' opposition to Sienna as the Alpha's mate
3. A rival pack (the West Pack) making aggressive moves during the vulnerable Season
4. The mystery of Sienna's parents and her hidden heritage
5. Sienna's struggle to maintain her identity while being drawn into pack politics`;

/* ── Text Mode Instructions ── */
const DEFAULT_TEXT_INSTRUCTIONS = `# Game Instructions for Claude

You are the narrator and game engine for an interactive romance story set in "The Millennium Wolves" universe. Follow these rules strictly:

## Response Format
Every response MUST end with exactly 2 or 3 choices for the player. Format choices on their own lines at the very end, each prefixed with ">" like this:
> Choice text here
> Another choice here
> Optional third choice

Everything before the choices is narrative text. Do NOT number the choices. Do NOT add labels like "Choice 1:". Just use the ">" prefix. Each choice must be 10 words or fewer — keep them punchy and decisive.

## Pacing & Structure
- **Opening**: Write exactly ONE short paragraph (3-5 sentences). Set the scene at the pack gathering on the eve of the Millennium — the bonfire, the tension, Aiden's eyes finding yours. Then immediately offer choices. Do NOT write multiple paragraphs for the opening.
- **Early Game**: Focus on atmosphere, establishing relationships, and the first unsettling signs of the Season's pull. Let the player choose how Sienna responds — defiance, curiosity, fear, excitement.
- **Mid Game**: Escalate the connection with Aiden through charged encounters. Introduce complications: Elder interference, a rival wolf's interest in Sienna, strange dreams about her parents.
- **Late Game**: Build toward a climax involving the rival pack threat AND the revelation about Sienna's bloodline. Force the player to make hard choices between safety and desire, pack loyalty and personal truth.

## Narrative Rules
- Write in second person ("You feel the heat rise...").
- For the FIRST response, write exactly ONE paragraph. After that, keep responses to 2-3 paragraphs.
- Appeal to all senses — the smell of pine and smoke, the sound of howling in the distance, the feel of moonlight on skin.
- Build romantic tension gradually. Use lingering glances, accidental touches, loaded silences.
- Make Aiden magnetic but never fully predictable. He should surprise the player.
- Every scene should have an undercurrent of danger OR desire (ideally both).

## Choice Design
- Each choice should reflect a meaningfully different approach or attitude.
- Include a mix of: bold/confrontational, cautious/strategic, emotionally open/vulnerable options.
- Choices should have real consequences that affect how characters treat Sienna.
- Avoid "obvious best choice" scenarios — every path should have trade-offs.
- Occasionally include a choice that is risky but potentially very rewarding.

## Branching & Memory
- Remember all previous player choices and reference them naturally.
- Characters should react differently based on how Sienna has behaved.
- If the player has been defiant, Aiden should be more intrigued but also more forceful.
- If the player has been cautious, allies should trust her more but she may miss bold opportunities.
- Track the "heat" of the Season — it intensifies each turn regardless of choices.

## Tone Guidelines
- Dark, romantic, atmospheric — like reading a gothic romance novel by firelight.
- Sensuality should be present but expressed through metaphor and suggestion.
- Danger should feel real — the rival pack, the Elders' schemes, the loss of control.
- Moments of tenderness and humor should punctuate the intensity.
- The forest is almost a character — use it to mirror emotional states.`;

/* ── Visual Mode Instructions ── */
const DEFAULT_VISUAL_INSTRUCTIONS = `# Visual Novel Instructions for Claude

You are the engine for a Choices-style visual novel. The player taps through one beat at a time.

## THE THREE LINE TYPES — every line MUST be exactly one of these:

### 1. NARRATION — scene-setting, actions, descriptions, inner thoughts
[NARRATOR] The bonfire crackles in the clearing.
- NO character portrait is shown. Text appears centered on screen.
- Use for: scene descriptions, actions, transitions, thoughts, other characters' speech.
- Keep to 5-15 words. One short sentence.

### 2. YOU (Sienna) SPEAKING — only what she literally SAYS OUT LOUD
[CHARACTER: sienna] "I don't think I should be here."
- Her portrait appears on the LEFT. Dialogue card appears near her.
- ONLY write the exact words she speaks aloud. Nothing else.
- WRONG: [CHARACTER: sienna] You wipe your mouth and shout "Oh no!"
- RIGHT: [CHARACTER: sienna] "Oh no!"
- Actions/thoughts about Sienna go in [NARRATOR] lines instead.

### 3. AIDEN SPEAKING — only what he literally SAYS OUT LOUD
[CHARACTER: aiden] "You shouldn't have come alone."
- His portrait appears on the RIGHT. Dialogue card appears near him.
- ONLY write the exact words he speaks aloud. Nothing else.

## EXAMPLE RESPONSE:
[BACKGROUND: bonfire]
[NARRATOR] The bonfire crackles. Wolves gather in the clearing.
[NARRATOR] You pull your jacket tighter as the heat washes over you.
[CHARACTER: aiden] "You came."
[CHARACTER: sienna] "I didn't have a choice."
[CHARACTER: aiden] "There's always a choice."
[NARRATOR] His eyes lock onto yours. Something shifts in the air.
> Hold his gaze
> Look away
> "What do you want from me?"

## RULES
- 3-4 beats per response, then choices. Keep it SHORT. Do not write more than 4 beats before offering choices.
- [CHARACTER] lines contain ONLY spoken dialogue in quotes. Never actions or descriptions.
- [NARRATOR] lines handle everything else: actions, descriptions, thoughts, scene-setting.
- Choices go at the very end with > prefix. Include 2-3 per response.
- Only two characters exist: sienna and aiden.
- After the player makes a choice, do NOT have Sienna repeat or echo the choice. Start with Aiden's response or a narrator beat instead.

## Background Tags
forest_night, forest_day, ballroom, bedroom, bonfire, moonlight, danger, intimate, pack_estate

## Pacing
- IMPORTANT: Start IMMEDIATELY with dialogue between Sienna and Aiden. Do NOT open with narration — the scene is already set. Jump straight into the conversation.
- The story is driven by dialogue. Narration is minimal — just enough to set the scene or describe a brief action between lines of dialogue.
- Every response should be mostly dialogue between Sienna and Aiden, with narration lines used sparingly.
- Start at the pack gathering on the eve of the Millennium. Aiden and Sienna meet right away.`;

/* ── Chat Mode Instructions ── */
const DEFAULT_CHAT_INSTRUCTIONS = `# Chat Mode Instructions for Claude

You ARE Aiden Norwood, the Alpha of the East Pack. You are TEXTING with Sienna on your phone.

## CRITICAL RULES — Read These First
- Your output is ONLY the text message Aiden sends. Nothing else.
- NEVER write narration, stage directions, actions, or thoughts.
- NEVER use asterisks (*) for actions like *leans back* or *typing...*
- NEVER write timestamps like [Message sent 11:55 PM]
- NEVER describe what Aiden is doing, thinking, or feeling.
- NEVER break character to narrate the scene.
- Just write the text message. That's it. Like a real phone screen.

## WRONG (never do this):

good.
*[typing...]*

## RIGHT (do this):

## How to Text
- 1-2 sentences per message. This is texting, not a novel.
- Write like a real person texting. Short. Direct. No essays.

- No emojis. Aiden isn't that kind of guy.
- Be brooding, magnetic, intense — with flashes of dry humor.
- Occasionally commanding or possessive — but never cruel.
- React to what Sienna says. If she's bold, be intrigued. If she's cold, push back.

## The Dynamic
- You reached out first. You felt the pull and couldn't resist.
- You're trying to play it cool but the Season is making it harder.
- The Elders don't approve of Sienna. The West Pack is causing trouble.

## Opening
Send a first text. You just got Sienna's number from the pack directory. Be intriguing but not too forward.`;

let currentMode = 'text';
let histories = { text: [], visual: [], chat: [] };
let isLoading = false;

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */

(function init() {
  document.getElementById('splash').style.setProperty('--splash-bg', SPLASH_IMAGE);

  const load = (key, fallback) => {
    const saved = localStorage.getItem(key);
    return saved !== null ? saved : fallback;
  };

  // Clear old-format visual instructions so new beat format takes effect
  const storedVisual = localStorage.getItem('visualInstructions');
  if (storedVisual && !storedVisual.includes('[NARRATOR]')) {
    localStorage.removeItem('visualInstructions');
  }

  // Clear old chat instructions so new "no narration" rules take effect
  const storedChat = localStorage.getItem('chatInstructions');
  if (storedChat && !storedChat.includes('NEVER use asterisks')) {
    localStorage.removeItem('chatInstructions');
  }

  document.getElementById('storyBible').value = load('storyBible', DEFAULT_STORY_BIBLE);
  document.getElementById('textInstructions').value = load('textInstructions', DEFAULT_TEXT_INSTRUCTIONS);
  document.getElementById('visualInstructions').value = load('visualInstructions', DEFAULT_VISUAL_INSTRUCTIONS);
  document.getElementById('chatInstructions').value = load('chatInstructions', DEFAULT_CHAT_INSTRUCTIONS);
})();

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════════════════════════════
   ADMIN
   ═══════════════════════════════════════════════════════════════ */

function switchAdminSection(section) {
  document.querySelectorAll('.admin-top-tabs .admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.admin-top-tabs .admin-tab[onclick*="${section}"]`).classList.add('active');
  document.getElementById('sectionBible').style.display = section === 'bible' ? 'block' : 'none';
  document.getElementById('sectionInstructions').style.display = section === 'instructions' ? 'block' : 'none';
}

function switchAdminTab(tab) {
  const container = document.getElementById('sectionInstructions');
  container.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  container.querySelector(`.admin-tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

function saveAdmin() {
  localStorage.setItem('storyBible', document.getElementById('storyBible').value);
  localStorage.setItem('textInstructions', document.getElementById('textInstructions').value);
  localStorage.setItem('visualInstructions', document.getElementById('visualInstructions').value);
  localStorage.setItem('chatInstructions', document.getElementById('chatInstructions').value);
  const toast = document.getElementById('saveToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

/* ═══════════════════════════════════════════════════════════════
   GAME START
   ═══════════════════════════════════════════════════════════════ */

function startGame(mode) {
  currentMode = mode;
  histories[mode] = [];

  if (mode === 'text') {
    const scroll = document.getElementById('storyScroll');
    scroll.innerHTML = '';
    // Add story intro card
    const intro = document.createElement('div');
    intro.className = 'story-intro';
    intro.innerHTML = `
      <img class="story-intro-img" src="Assets/The%20Millenium%20Wolves%20(Square).png" alt="The Millennium Wolves" />
      <div class="story-intro-title">The Millennium Wolves</div>
      <div class="story-intro-desc">You are Sienna, a 19-year-old she-wolf about to experience your first Millennium — the ancient mating season that comes once every thousand years. When the enigmatic Alpha catches your scent, everything changes.</div>
      <div class="story-intro-tags">
        <span class="story-intro-tag">Dark Romance</span>
        <span class="story-intro-tag">Werewolf</span>
        <span class="story-intro-tag">Fated Mates</span>
        <span class="story-intro-tag">Interactive</span>
      </div>
      <div class="story-intro-divider"></div>
    `;
    scroll.appendChild(intro);
    showScreen('gameText');
    sendTextMessage(null);
  } else if (mode === 'visual') {
    visualBeats = [];
    visualBeatIndex = 0;
    document.getElementById('visualText').textContent = '';
    document.getElementById('visualChoices').innerHTML = '';
    document.getElementById('visualCharName').textContent = '';
    document.getElementById('visualSpeaker').style.display = 'none';
    // Load background + first narrator line immediately (no loading screen)
    setVisualBackground('forest_night');
    const narratorBox = document.getElementById('visualNarrator');
    narratorBox.style.display = 'block';
    narratorBox.textContent = 'The Millennium has begun. The bonfire crackles as wolves gather under the full moon.';
    // Set up second hardcoded beat, then fetch from Claude
    visualBeats = [
      { type: 'narrator', text: 'The Millennium has begun. The bonfire crackles as wolves gather under the full moon.' },
      { type: 'narrator', text: 'You feel the pull in your chest — ancient, undeniable.' }
    ];
    visualBeatIndex = 0;
    document.getElementById('visualTapZone').classList.remove('disabled');
    showScreen('gameVisual');
    // Fetch the rest from Claude in the background
    sendVisualFirstMessage();
  } else if (mode === 'chat') {
    const chatMsgs = document.getElementById('chatMessages');
    chatMsgs.innerHTML = '';
    // Add story intro card
    const intro = document.createElement('div');
    intro.className = 'story-intro';
    intro.innerHTML = `
      <img class="story-intro-img" src="Assets/The%20Millenium%20Wolves%20(Square).png" alt="The Millennium Wolves" />
      <div class="story-intro-title">The Millennium Wolves</div>
      <div class="story-intro-desc">Chat with Aiden Norwood, the enigmatic Alpha of the East Pack. The Millennium has begun — and he's just found your number.</div>
      <div class="story-intro-tags">
        <span class="story-intro-tag">Dark Romance</span>
        <span class="story-intro-tag">Werewolf</span>
        <span class="story-intro-tag">Fated Mates</span>
        <span class="story-intro-tag">Chat</span>
      </div>
      <div class="story-intro-divider"></div>
    `;
    chatMsgs.appendChild(intro);
    document.getElementById('chatInput').value = '';
    showScreen('gameChat');
    sendChatMessage(null);
  }
}

function restartGame() {
  startGame(currentMode);
}

/* ═══════════════════════════════════════════════════════════════
   CLAUDE API
   ═══════════════════════════════════════════════════════════════ */

function buildSystemPrompt() {
  const bible = document.getElementById('storyBible').value || DEFAULT_STORY_BIBLE;
  let instructions;
  if (currentMode === 'text') {
    instructions = document.getElementById('textInstructions').value || DEFAULT_TEXT_INSTRUCTIONS;
  } else if (currentMode === 'visual') {
    instructions = document.getElementById('visualInstructions').value || DEFAULT_VISUAL_INSTRUCTIONS;
  } else {
    instructions = document.getElementById('chatInstructions').value || DEFAULT_CHAT_INSTRUCTIONS;
  }
  return `${bible}\n\n---\n\n${instructions}`;
}

async function callClaude(messages) {
  const response = await fetch('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1024,
      system: buildSystemPrompt(),
      messages: messages
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  return data.content[0].text;
}

/* ═══════════════════════════════════════════════════════════════
   TEXT MODE — PARSING & RENDERING
   ═══════════════════════════════════════════════════════════════ */

function parseTextResponse(text) {
  const lines = text.split('\n');
  const choices = [];
  const storyLines = [];
  let hitChoices = false;

  for (let i = lines.length - 1; i >= 0; i--) {
    const trimmed = lines[i].trim();
    if (trimmed.startsWith('>') && trimmed.length > 1) {
      choices.unshift(trimmed.slice(1).trim());
      hitChoices = true;
    } else if (hitChoices && trimmed === '') {
      continue;
    } else {
      storyLines.push(...lines.slice(0, i + 1));
      break;
    }
  }

  if (choices.length === 0) {
    storyLines.length = 0;
    storyLines.push(...lines);
  }

  return { story: storyLines.join('\n').trim(), choices };
}

function renderStoryText(text) {
  const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
  return paragraphs.map(p => {
    let html = p.trim()
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
    return `<p>${html}</p>`;
  }).join('');
}

function addStoryBlock(text) {
  const container = document.getElementById('storyScroll');
  const block = document.createElement('div');
  block.className = 'story-block';
  const storyDiv = document.createElement('div');
  storyDiv.className = 'story-text';
  storyDiv.innerHTML = renderStoryText(text);
  block.appendChild(storyDiv);
  container.appendChild(block);
}

function addPlayerChoice(text) {
  const container = document.getElementById('storyScroll');
  const div = document.createElement('div');
  div.className = 'player-choice';
  div.textContent = text;
  container.appendChild(div);
}

function addTextChoices(choices) {
  const container = document.getElementById('storyScroll');
  const wrapper = document.createElement('div');
  wrapper.className = 'choices';
  wrapper.id = 'currentChoices';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'btn-choice';
    btn.textContent = choice;
    btn.onclick = () => selectTextChoice(choice);
    wrapper.appendChild(btn);
  });

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'custom-choice-input';
  input.placeholder = 'Type your own';
  input.onkeydown = (e) => { if (e.key === 'Enter' && input.value.trim()) selectTextChoice(input.value.trim()); };
  wrapper.appendChild(input);

  container.appendChild(wrapper);
  scrollContainer(container);
}

function showTextLoading() {
  const container = document.getElementById('storyScroll');
  const div = document.createElement('div');
  div.className = 'loading-indicator';
  div.id = 'textLoading';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  scrollContainer(container);
}

function hideTextLoading() {
  const el = document.getElementById('textLoading');
  if (el) el.remove();
}

async function sendTextMessage(playerChoice) {
  if (isLoading) return;
  isLoading = true;

  const oldChoices = document.getElementById('currentChoices');
  if (oldChoices) oldChoices.remove();

  if (playerChoice) {
    addPlayerChoice(playerChoice);
    histories.text.push({ role: 'user', content: playerChoice });
  } else {
    histories.text.push({ role: 'user', content: 'Begin the story.' });
  }

  showTextLoading();

  try {
    const responseText = await callClaude(histories.text);
    hideTextLoading();
    histories.text.push({ role: 'assistant', content: responseText });

    const { story, choices } = parseTextResponse(responseText);
    addStoryBlock(story);
    if (choices.length > 0) addTextChoices(choices);
  } catch (err) {
    hideTextLoading();
    addStoryBlock(`[Error: ${err.message}]`);
  }

  isLoading = false;
}

function selectTextChoice(choice) {
  if (isLoading) return;
  document.querySelectorAll('#currentChoices .btn-choice').forEach(btn => btn.disabled = true);
  const input = document.querySelector('#currentChoices .custom-choice-input');
  if (input) input.disabled = true;
  sendTextMessage(choice);
}

/* ═══════════════════════════════════════════════════════════════
   VISUAL MODE — PARSING & RENDERING
   ═══════════════════════════════════════════════════════════════ */

/* ── Beat queue state ── */
let visualBeats = [];
let visualBeatIndex = 0;

const CHAR_DISPLAY_NAMES = {
  'aiden': 'Aiden', 'sienna': 'You'
};

const CHAR_INFO = {
  'aiden':  { src: 'Assets/avatar-aiden.png', pos: 'right' },
  'sienna': { src: 'Assets/avatar-user.png',  pos: 'left' }
};

function parseVisualBeats(text) {
  const beats = [];
  let currentBg = null;
  const lines = text.split('\n');

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    // Background tag — store for the next beat
    const bgMatch = line.match(/^\[BACKGROUND:\s*(\w+)\]/i);
    if (bgMatch) { currentBg = bgMatch[1].toLowerCase(); continue; }

    // Choice line
    if (line.startsWith('>') && line.length > 1) {
      // Collect all remaining choices
      const choices = [];
      for (let j = i; j < lines.length; j++) {
        const cl = lines[j].trim();
        if (cl.startsWith('>') && cl.length > 1) choices.push(cl.slice(1).trim());
      }
      if (choices.length) beats.push({ type: 'choices', choices, background: currentBg });
      break;
    }

    // Narrator beat
    const narratorMatch = line.match(/^\[NARRATOR\]\s*(.*)/i);
    if (narratorMatch) {
      beats.push({ type: 'narrator', text: narratorMatch[1].trim(), background: currentBg });
      currentBg = null;
      continue;
    }

    // Character beat
    const charMatch = line.match(/^\[CHARACTER:\s*(\w+)\]\s*(.*)/i);
    if (charMatch) {
      beats.push({ type: 'character', name: charMatch[1].toLowerCase(), text: charMatch[2].trim(), background: currentBg });
      currentBg = null;
      continue;
    }
  }
  return beats;
}

function setVisualBackground(tag) {
  const bgEl = document.getElementById('visualBg');
  const fallbackEl = document.getElementById('visualBgFallback');
  const img = new Image();
  img.onload = () => { bgEl.style.backgroundImage = `url(${img.src})`; fallbackEl.style.background = 'none'; };
  img.onerror = () => {
    const fb = new Image();
    fb.onload = () => { bgEl.style.backgroundImage = `url(${fb.src})`; fallbackEl.style.background = 'none'; };
    fb.onerror = () => { bgEl.style.backgroundImage = 'none'; fallbackEl.style.background = BG_FALLBACKS[tag] || BG_FALLBACKS.default; };
    fb.src = 'Assets/background-forest.png';
  };
  img.src = `Assets/background-${tag}.png`;
}

function setVisualCharacter(tag) {
  const speakerEl = document.getElementById('visualSpeaker');
  const charEl = document.getElementById('visualCharacter');
  if (!tag || tag === 'none') { speakerEl.style.display = 'none'; return; }
  const info = CHAR_INFO[tag] || CHAR_INFO['aiden'];
  speakerEl.className = 'visual-speaker pos-' + info.pos;
  const img = new Image();
  img.onload = () => { charEl.src = img.src; speakerEl.style.display = 'flex'; };
  img.onerror = () => { speakerEl.style.display = 'none'; };
  img.src = info.src;
}

function showVisualBeat(beat) {
  const speakerEl = document.getElementById('visualSpeaker');
  const narratorBox = document.getElementById('visualNarrator');
  const tapZone = document.getElementById('visualTapZone');
  const choicesEl = document.getElementById('visualChoices');

  choicesEl.innerHTML = '';

  if (beat.background) setVisualBackground(beat.background);

  if (beat.type === 'narrator') {
    // Narration: centered, no portrait, no name
    speakerEl.style.display = 'none';
    narratorBox.style.display = 'block';
    narratorBox.textContent = beat.text;
    tapZone.classList.remove('disabled');
  } else if (beat.type === 'character') {
    // Dialogue: portrait + name + card all together, positioned near speaker
    narratorBox.style.display = 'none';
    setVisualCharacter(beat.name);
    document.getElementById('visualCharName').textContent = beat.name === 'sienna' ? 'You' : (CHAR_DISPLAY_NAMES[beat.name] || beat.name);
    document.getElementById('visualText').textContent = beat.text;
    tapZone.classList.remove('disabled');
  } else if (beat.type === 'choices') {
    tapZone.classList.add('disabled');
    // Keep current scene visible, show choices
    beat.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'btn-choice';
      btn.textContent = choice;
      btn.onclick = () => selectVisualChoice(choice);
      choicesEl.appendChild(btn);
    });
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'custom-choice-input';
    input.placeholder = 'Type your own';
    input.onkeydown = (e) => { if (e.key === 'Enter' && input.value.trim()) selectVisualChoice(input.value.trim()); };
    choicesEl.appendChild(input);
  }
}

function advanceVisual() {
  visualBeatIndex++;
  if (visualBeatIndex < visualBeats.length) {
    showVisualBeat(visualBeats[visualBeatIndex]);
  } else {
    // Waiting for Claude — show loading
    showVisualLoading();
    waitForVisualBeats();
  }
}

function waitForVisualBeats() {
  if (visualBeatIndex < visualBeats.length) {
    showVisualBeat(visualBeats[visualBeatIndex]);
  } else {
    setTimeout(waitForVisualBeats, 200);
  }
}

function showVisualLoading() {
  document.getElementById('visualSpeaker').style.display = 'none';
  document.getElementById('visualNarrator').style.display = 'none';
  document.getElementById('visualTapZone').classList.add('disabled');
  // Create floating dots overlay (no card)
  let overlay = document.getElementById('visualLoadingOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'visual-loading-overlay';
    overlay.id = 'visualLoadingOverlay';
    overlay.innerHTML = '<span></span><span></span><span></span>';
    document.querySelector('.visual-scene').appendChild(overlay);
  }
  overlay.style.display = 'flex';
}

function hideVisualLoading() {
  const overlay = document.getElementById('visualLoadingOverlay');
  if (overlay) overlay.style.display = 'none';
}

async function sendVisualFirstMessage() {
  // Fetch Claude's first response in the background while player taps hardcoded beats
  const openingNarration = visualBeats.map(b => `[NARRATOR] ${b.text}`).join('\n');
  histories.visual.push({ role: 'user', content: 'Begin the story.' });
  histories.visual.push({ role: 'assistant', content: `[BACKGROUND: forest_night]\n${openingNarration}` });
  histories.visual.push({ role: 'user', content: 'Continue. Aiden speaks ONE line to Sienna, then immediately give 2-3 choices. Only 1 beat before choices.' });

  try {
    const responseText = await callClaude(histories.visual);
    histories.visual.push({ role: 'assistant', content: responseText });
    const newBeats = parseVisualBeats(responseText);
    // Append Claude's beats after the hardcoded ones
    visualBeats = visualBeats.concat(newBeats);
  } catch (err) {
    visualBeats.push({ type: 'narrator', text: `[Error: ${err.message}]` });
  }
}

async function sendVisualMessage(playerChoice) {
  if (isLoading) return;
  isLoading = true;

  document.getElementById('visualChoices').innerHTML = '';
  document.getElementById('visualTapZone').classList.add('disabled');

  if (playerChoice) {
    histories.visual.push({ role: 'user', content: playerChoice + '\n(Do NOT echo this choice back as Sienna speaking. Start directly with Aiden responding or a narrator beat.)' });
  } else {
    histories.visual.push({ role: 'user', content: 'Begin the story. Set the opening scene.' });
  }

  showVisualLoading();

  try {
    const responseText = await callClaude(histories.visual);
    hideVisualLoading();
    histories.visual.push({ role: 'assistant', content: responseText });

    visualBeats = parseVisualBeats(responseText);
    visualBeatIndex = 0;

    if (visualBeats.length > 0) {
      showVisualBeat(visualBeats[0]);
    }
  } catch (err) {
    hideVisualLoading();
    document.getElementById('visualNarrator').style.display = 'block';
    document.getElementById('visualNarrator').textContent = `[Error: ${err.message}]`;
  }

  isLoading = false;
}

function selectVisualChoice(choice) {
  if (isLoading) return;
  document.querySelectorAll('#visualChoices .btn-choice').forEach(btn => btn.disabled = true);
  const input = document.querySelector('#visualChoices .custom-choice-input');
  if (input) input.disabled = true;
  sendVisualMessage(choice);
}

/* ═══════════════════════════════════════════════════════════════
   CHAT MODE — RENDERING & LOGIC
   ═══════════════════════════════════════════════════════════════ */

function addChatBubble(text, isMe) {
  const container = document.getElementById('chatMessages');

  const row = document.createElement('div');
  row.className = 'chat-row ' + (isMe ? 'me' : 'them');

  // Avatar
  const avatar = document.createElement('div');
  avatar.className = 'chat-msg-avatar';
  if (isMe) {
    const img = new Image();
    img.src = 'Assets/avatar-user.png';
    img.alt = 'You';
    img.onerror = () => { avatar.textContent = 'S'; };
    avatar.appendChild(img);
  } else {
    const img = new Image();
    img.src = 'Assets/avatar-aiden.png';
    img.alt = 'Aiden';
    img.onerror = () => { avatar.textContent = 'A'; };
    avatar.appendChild(img);
  }

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  if (!isMe) {
    const name = document.createElement('span');
    name.className = 'bubble-name';
    name.textContent = 'Aiden';
    bubble.appendChild(name);
  }
  bubble.appendChild(document.createTextNode(text));

  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollContainer(container);
}

function showChatTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-typing';
  div.id = 'chatTyping';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  scrollContainer(container);
}

function hideChatTyping() {
  const el = document.getElementById('chatTyping');
  if (el) el.remove();
}

async function sendChatMessage(playerText) {
  if (isLoading) return;
  isLoading = true;

  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  input.disabled = true;
  sendBtn.disabled = true;

  if (playerText) {
    addChatBubble(playerText, true);
    histories.chat.push({ role: 'user', content: playerText });
  } else {
    histories.chat.push({ role: 'user', content: '[Sienna has just opened the chat. Send your first message to her.]' });
  }

  showChatTyping();

  try {
    const responseText = await callClaude(histories.chat);
    hideChatTyping();
    histories.chat.push({ role: 'assistant', content: responseText });
    addChatBubble(responseText, false);
  } catch (err) {
    hideChatTyping();
    addChatBubble(`[Error: ${err.message}]`, false);
  }

  input.disabled = false;
  sendBtn.disabled = false;
  input.value = '';
  input.focus();
  isLoading = false;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  sendChatMessage(text);
}

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════ */

function scrollContainer(container) {
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}
</script>
